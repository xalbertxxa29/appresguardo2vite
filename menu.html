<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Menú Principal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/menu.css" />
    <link rel="stylesheet" href="./src/loader-overlay.css" />
</head>

<body>
    <div class="menu-container">

        <!-- Encabezado -->
        <div class="status-wrapper">
            <span class="siren"></span>
            <h2 id="status-message">
                <span class="welcome-text">Cargando registros...</span>
            </h2>
        </div>

        <!-- Botones de navegación -->
        <div class="menu-buttons">
            <button class="menu-button" id="checklist-btn">
                <span class="icon">✅</span>
                <span class="text">CHECK LIST</span>
            </button>
            <button class="menu-button" id="plan-ejercicios-btn">
                <span class="icon">🏋️‍♂️</span>
                <span class="text">PLAN DE EJERCICIOS</span>
            </button>
            <button class="menu-button" id="contactos-btn">
                <span class="icon">📞</span>
                <span class="text">CONTACTOS DE EMERGENCIA</span>
            </button>
            <button class="menu-button" id="evidencia-ejercicios-btn">
                <span class="icon">📸</span>
                <span class="text">Evidencia de Ejercicios</span>
            </button>
            <button class="menu-button" id="reporte-incidencias-btn">
                <span class="icon">📝</span>
                <span class="text">Reporte de Incidencias</span>
            </button>
        </div>

        <!-- Separador + Botón de cerrar sesión FUERA de la lista -->
        <div class="logout-zone">
            <div class="logout-divider">
                <span class="logout-divider-line"></span>
                <span class="logout-divider-label">⚠ Zona Restringida</span>
                <span class="logout-divider-line"></span>
            </div>
            <button id="logout-btn">
                <span class="logout-icon-wrap">🔒</span>
                <span class="logout-label">Cerrar Sesión</span>
                <span class="logout-arrow">→</span>
            </button>
        </div>

    </div>

    <!-- Overlay Verificando Sesión -->
    <div id="checking-session-overlay"
        style="position: fixed; inset:0; background:rgba(0,0,0,0.95); z-index: 3000; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white;">
        <div class="spinner"
            style="border: 3px solid rgba(255,255,255,0.2); border-top: 3px solid #e53935; border-radius: 50%; width: 46px; height: 46px; animation: spin 1s linear infinite; margin-bottom: 16px;">
        </div>
        <h2 style="font-family:'Inter',sans-serif; font-weight:600; font-size:1.1rem;">Verificando turno...</h2>
    </div>

    <!-- Modal de Inicio de Labores -->
    <div id="start-work-modal" class="modal-overlay" role="dialog" aria-modal="true" style="display: none;">
        <div class="modal-content">
            <h3 style="margin-top:0; color:#e53935; font-size:1.4rem; margin-bottom:10px;">Iniciar Jornada</h3>
            <p class="modal-message" style="color:rgba(255,255,255,0.8); font-size:1rem; margin-bottom:20px;">¿Deseas
                iniciar labores?</p>
            <div style="display:flex; gap:10px; justify-content:center; margin-top:16px;">
                <button id="start-work-confirm" class="modal-button"
                    style="background:linear-gradient(135deg,#28a745,#1e7e34);">Iniciar Labores</button>
                <button id="start-work-cancel" class="modal-button"
                    style="background:linear-gradient(135deg,#6c757d,#495057);">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- Modal de Confirmación de Cierre -->
    <div id="logout-confirm-modal" class="modal-overlay" role="dialog" aria-modal="true" style="display: none;">
        <div class="modal-content">
            <h3 style="margin-top:0; color:#e53935; font-size:1.4rem; margin-bottom:10px;">Finalizar Turno</h3>
            <p id="logout-message" class="modal-message"
                style="color:rgba(255,255,255,0.8); font-size:0.95rem; margin-bottom:20px;">
                Al cerrar sesión estás indicando que ya terminaste tu horario de trabajo. ¿Deseas finalizar?
            </p>
            <div style="display:flex; gap:10px; justify-content:center; margin-top:16px;">
                <button id="logout-confirm-btn" class="modal-button"
                    style="background:linear-gradient(135deg,#e53935,#b71c1c);">Aceptar y Salir</button>
                <button id="logout-cancel-btn" class="modal-button"
                    style="background:linear-gradient(135deg,#6c757d,#495057);">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- Modal Genérico de Notificación -->
    <div id="notification-modal" class="modal-overlay" role="dialog" aria-modal="true" style="display: none;">
        <div class="modal-content" style="padding:2rem;">
            <div style="font-size:3rem; margin-bottom:10px;">✅</div>
            <h3 id="notification-title" style="margin-top:0; color:#28a745; font-size:1.4rem; margin-bottom:12px;">
                ¡Éxito!</h3>
            <p id="notification-message" class="modal-message"
                style="color:rgba(255,255,255,0.8); font-size:1rem; margin-bottom:20px;">
                Operación realizada correctamente.
            </p>
            <button id="notification-ok-btn" class="modal-button"
                style="background:linear-gradient(135deg,#28a745,#1e7e34); width:100%; max-width:200px;">Aceptar</button>
        </div>
    </div>

    <style>
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>

    <script type="module" src="./src/menu.js"></script>
</body>

</html>
