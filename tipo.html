<!-- tipo.html -->
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Tipo de Resguardo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/tipo.css">
    <link rel="stylesheet" href="./src/loader-overlay.css">
</head>

<body>
    <div class="bg-image"></div>
    <div class="overlay"></div>

    <div class="container">
        <img class="container-logo" src="./imagenes/logo.webp" alt="Liderman" />
        <p id="welcome-message" class="welcome-message">Cargando...</p>
        <h1>Tipo de Resguardo</h1>
        <p class="tipo-subtitle">Selecciona tu rol para continuar</p>
        <div class="button-group">
            <button id="resguardo-btn" class="btn btn-resguardo">🛡️ Resguardo</button>
            <button id="conductor-btn" class="btn btn-conductor">🚗 Conductor</button>
        </div>
        <button id="back-btn" class="btn btn-back">← Regresar</button>
    </div>

    <script type="module" src="./src/tipo.js"></script>
</body>

</html>
